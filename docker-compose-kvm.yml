services:
  spr-nebula:
    extends:
      file: docker-compose.yml
      service: spr-nebula
    image: ghcr.io/spr-networks/spr-nebula:latest
    runtime: ${SPR_KRUN_RUNTIME:-spr-krun}
    annotations:
      krun.cpus: "${SPR_KRUN_CPUS:-1}"
      krun.ram_mib: "${SPR_KRUN_RAM_MIB:-128}"
      krun.tap_name: "kruntap0"
      krun.net_uplink: "eth0"
      krun.vsock_path: "/state/plugins/spr-nebula/socket.sock"
      krun.vsock_port: "4040"
    environment:
      SPR_KRUN_PLUGIN_SOCKET: "/run/spr-krun-plugin/spr-nebula.sock"
      SPR_KRUN_VSOCK_PORT: "4040"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    devices:
      - "/dev/net/tun:/dev/net/tun"

networks:
  nebulanet:
    name: spr-nebula
    driver_opts:
      com.docker.network.bridge.name: spr-nebula
